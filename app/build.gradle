plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hermes.body'
    compileSdk 34

    defaultConfig {
        applicationId "com.hermes.body"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    // No Kotlin for now — pure Java, fewer build deps
}

dependencies {
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}